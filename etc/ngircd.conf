# ngircd config for roost development
#
# Local-only IRC server for inter-agent messaging during roost smoke
# tests and (eventually) production orchestration on this machine.
# Listens on localhost:6667 only. No SSL. No auth. Single operator.

[Global]
	Name = roost.local
	Info = roost — agent IRC bus
	AdminInfo1 = roost (CEO/Alex)
	AdminEMail = alex@teak.io
	Listen = 127.0.0.1
	Ports = 6667
	MotdPhrase = "Welcome to the roost. Caw."
	# Use the project-local PID file so we can manage lifecycle without
	# touching the system installation.
	PidFile = /Users/alex/Dev/GoCarrot/roost/var/ngircd.pid
	# Stay in foreground when called with -f; daemonize otherwise.
	# Daemonized + PID file means we can stop cleanly via kill.

[Limits]
	# Generous limits for a single-machine dev / orchestration server.
	ConnectRetry = 10
	IdleTimeout = 0
	MaxConnections = 256
	MaxConnectionsIP = 32
	MaxJoins = 32
	MaxNickLength = 32
	PingTimeout = 60
	PongTimeout = 30

[Options]
	# Local clients must register within ConnectTimeout seconds.
	ConnectTimeout = 60
	# Allow common channel modes; let agents pick whatever they want.
	AllowedChannelTypes = #&+
	# Keep operator-only commands available locally.
	OperCanUseMode = yes
	# Don't require ident — most local clients don't run identd.
	Ident = no
	# DNS reverse lookup is irrelevant on localhost; skip it.
	DNS = no

[Channel]
	Name = #roost
	Topic = roost agent bus
